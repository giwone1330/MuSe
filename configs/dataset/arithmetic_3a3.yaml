_target_: src.data.generator.EquationSyntheticDatasetBuilder
generate_args:
  splitsizes:
    train: 1000
    test: 100
    validation: 100
  digitranges:
    train:
      operand_1:
      - 1
      - 3
      operand_2:
      - 1
      - 3
    test:
      operand_1:
      - 1
      - 3
      operand_2:
      - 1
      - 3
    validation:
      operand_1:
      - 1
      - 3
      operand_2:
      - 1
      - 3
  balance_digits:
    train: true
    test: false
    validation: false
  shuffle:
    train: true
    test: true
    validation: true
  operators:
    train:
      operator_1:
      - +
    test:
      operator_1:
      - +
    validation:
      operator_1:
      - +
  radix: 10
  parenthesis: None
  batch_size: 1000
save_args:
  save: false
  save_dir: data/eqn
  save_in_staging: false
  push_to_hub: false
  force_build: true
  exit_after_save: false
  exit_after_push: false
non_inst:
  pre_processor:
    _target_: src.data.pre_processor.causal_lm_pre_processor
    tokenize_args:
      truncation: true
      max_length: 128
      padding: max_length
      return_token_type_ids: false
      add_special_tokens: true
    map_args:
      batched: true
      batch_size: 1000
      num_proc: Max
    manipulate_args:
      input_ids: input_ids
      attention_mask: attention_mask
      labels: labels
    formatter:
      _target_: src.data.pre_processor.formatter
      method_name: format_equations
    masker:
      _target_: src.data.pre_processor.masker
      method_name: mask_equations
      masker_args:
        substring: '='
  split_map:
    train: train
    eval: test