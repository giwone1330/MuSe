defaults:
  - trainer: hf_trainer
  - env: default
  - tokenizer: gpt2_pretrained
  - model: null
  - _self_

tokenizer:
  _target_: transformers.AutoTokenizer.from_pretrained
  pretrained_model_name_or_path: gpt2
  pad_token: <|endoftext|>
  non_inst:
    setattr:
      model_max_length: 2048


dataset:
  _target_: datasets.load_dataset
  path: HuggingFaceFW/fineweb
  name: sample-100BT
  streaming: false
  non_inst:
    pre_processor:
      _target_: src.data.pre_processor.efficient_packed_causal_lm_pre_processor
      block_size: 2048
      train2val: 0.005  # 0.5% of train for validation, 99.5% for train (set to null to use original splits)
      map_args:
        batched: true
        batch_size: 1000
        num_proc: max
    split_map:
      train: train
      eval: validation

trainer:
  non_inst:
    data_collator:
      _target_: transformers.DataCollatorForLanguageModeling
      mlm: false
  args:
    per_device_train_batch_size: 16
    per_device_eval_batch_size: 16
    num_train_epochs: 3
  callbacks:
    - _target_: transformers.EarlyStoppingCallback
      early_stopping_patience: 3
    - _target_: src.train.trainer_hooks.TimeLimitCallback
      max_seconds: 36000

evaluator:
  _target_: src.eval.evaluator.CustomEvaluatorPerplexity
  splits:
    - validation
  non_inst:
    max_length: 2048

env:
  huggingface:
    model_name: fineweb_f_${model.non_inst.model_type}_l${model.config.n_layer}h${model.config.n_head}d${model.config.n_embd}
    private: true
